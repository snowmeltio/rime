name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        env:
          # screenshots.mjs (not exercised by `npm test`) is the only consumer
          # of puppeteer; skip its ~500MB Chrome download on every run.
          PUPPETEER_SKIP_DOWNLOAD: 'true'
      - run: npm test
      - run: npx --yes @vscode/vsce@3 package --out /tmp/rime-ci-check.vsix
